    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            /* Glowing green phosphor terminal text styling */
            color: #d1f7d1; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            cursor: pointer;
            user-select: none;
            text-shadow: 0 0 5px rgba(209, 247, 209, 0.4);
        }

        #ascii-renderer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Very small font and line height to handle massive ASCII density */
            font-size: 9px;
            line-height: 9px;
            color: #555; /* Dim color to make it feel background-ish */
            overflow: hidden;
            white-space: pre;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.1s;
        }

        #spotlight-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Focus spotlight purely on the dialogue text and center area */
            background: radial-gradient(circle at 50% 55%, transparent 10%, rgba(0, 0, 0, 0.98) 55%);
            z-index: 2;
        }

        #dialogue-box {
            position: absolute;
            bottom: 5%;
            width: 80%;
            max-width: 900px;
            min-height: 150px;
            background-color: rgba(0, 0, 0, 0.98);
            border: 1px solid #6f6;
            padding: 20px;
            z-index: 4;
            display: none;
        }

        #speaker {
            font-weight: bold;
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #fff;
            text-transform: uppercase;
            border-bottom: 1px dotted #6f6;
            padding-bottom: 5px;
        }

        #text {
            font-size: 1.5rem;
            line-height: 1.5;
        }

        #start-screen {
            z-index: 5;
            font-size: 2.5rem;
            letter-spacing: 5px;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .shake {
            animation: shake 0.15s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
    </style>

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.value = 60; // The continuous 60Hz hum
            gainNode.gain.value = 0.25;
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        function typeWriter(text, index, callback) {
            if (index < text.length) {
                textEl.innerHTML += text.charAt(index);
                // Keep the fast typing speed
                setTimeout(() => typeWriter(text, index + 1, callback), 20);
            } else {
                callback();
            }

        function nextLine() {
            if (isTyping || currentLine >= script.length) {
                // If they click while typing, instantly finish the line
                if (isTyping) {
                    textEl.innerHTML = script[currentLine-1].text;
                    isTyping = false;
                }
                return;

            const line = script[currentLine];
            
            // Handle Blackout/End
            if (line.effect === "blackout") {
                rendererEl.innerText = "";
                document.getElementById('spotlight-overlay').style.display = "none";
                dialogueBox.style.display = "none";
                if(oscillator) oscillator.stop();
                return;

            // Draw the visual (the dense ASCII block) and apply the visual color style

            rendererEl.style.color = line.style;

            // Handle Shake Effect for Shrek's intense moments
            rendererEl.classList.remove("shake");
            if (line.effect === "shake") {
                void rendererEl.offsetWidth; // trigger reflow
                rendererEl.classList.add("shake");
            }

            // Handle Dialogue box display and typing

            speakerEl.innerText = line.speaker;
            textEl.innerHTML = "";
            isTyping = true;
            
            typeWriter(line.text, 0, () => {
                isTyping = false;
            });

            currentLine++;

                initAudio();

            } else {
